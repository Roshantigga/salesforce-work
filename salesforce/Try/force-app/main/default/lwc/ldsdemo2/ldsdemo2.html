<template>
    <lightning-card title="Record Edit Form">

        <lightning-record-edit-form 
            object-api-name={objectApiName}
            onsuccess={handleSuccess}>

            <lightning-messages></lightning-messages>

            <lightning-input-field field-name={nameField}></lightning-input-field>
            <lightning-input-field field-name={phoneField}></lightning-input-field>
            <lightning-input-field field-name={websiteField}></lightning-input-field>

            <lightning-button type="submit" label="Save" variant="brand"></lightning-button>
            <lightning-button label="Reset" onclick={handleReset}></lightning-button>

        </lightning-record-edit-form>

    </lightning-card>
</template>
